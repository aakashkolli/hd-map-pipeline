services:
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    command: >
      python scripts/run_pipeline.py
      --config configs/default.yaml
      --stage full
      --output data/outputs

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./scripts:/app/scripts
      - ./src:/app/src
    command: python src/api/server.py

  viz:
    build:
      context: .
      dockerfile: docker/Dockerfile.viz
    ports:
      - "5173:5173"
    volumes:
      - ./data/outputs:/app/public/data
    environment:
      - VITE_API_TARGET=http://api:8000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
