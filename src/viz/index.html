<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HD Map Pipeline Viewer</title>
    <style>
      /* ─── Reset ─────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ─── Root layout ───────────────────────────────────────── */
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI',
                     system-ui, sans-serif;
        font-size: 12px;
        color: #e6edf3;
      }

      /* Monospace reserved for numbers, coords, keyboard hints */
      .mono {
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      body {
        display: flex;
        flex-direction: row;
      }

      /* ─── Sidebar ───────────────────────────────────────────── */
      #sidebar {
        width: 240px;
        min-width: 240px;
        height: 100%;
        background: #161b22;
        border-right: 1px solid #21262d;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: #30363d #161b22;
        flex-shrink: 0;
        user-select: none;
      }

      #sidebar::-webkit-scrollbar { width: 4px; }
      #sidebar::-webkit-scrollbar-track { background: #161b22; }
      #sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

      .sb-header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid #21262d;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .sb-title {
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.01em;
      }

      .sb-github-link {
        color: #e6edf3;
        display: flex;
        align-items: center;
        opacity: 0.7;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }

      .sb-github-link:hover { opacity: 1; }

      .sb-demo-note {
        font-size: 10px;
        color: #6e7681;
        font-style: italic;
        padding: 2px 0;
      }

      /* ─── Sections ──────────────────────────────────────────── */
      .sb-section {
        padding: 12px 16px;
        border-bottom: 1px solid #21262d;
        flex-shrink: 0;
      }

      .sb-section-grow {
        flex: 1;
        min-height: 60px;
      }

      .sb-section-label {
        font-size: 10px;
        letter-spacing: 0.04em;
        color: #8b949e;
        margin-bottom: 8px;
        font-weight: 500;
      }

      /* ─── Layer rows ────────────────────────────────────────── */
      .sb-layer-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 0;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s;
      }

      .sb-layer-row:hover { background: #1c2128; margin: 0 -4px; padding-left: 4px; padding-right: 4px; }

      .sb-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .sb-layer-name {
        flex: 1;
        font-size: 11px;
        color: #c9d1d9;
      }

      .sb-key {
        font-size: 10px;
        color: #6e7681;
        flex-shrink: 0;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      /* ─── Toggle pill ───────────────────────────────────────── */
      .sb-toggle {
        width: 24px;
        height: 13px;
        border-radius: 7px;
        flex-shrink: 0;
        position: relative;
        transition: background 0.15s;
      }

      .sb-toggle::after {
        content: '';
        position: absolute;
        top: 2px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #0d1117;
        transition: left 0.15s;
      }

      .sb-toggle.on  { background: #238636; }
      .sb-toggle.off { background: #30363d; }

      .sb-toggle.on::after  { left: 13px; }
      .sb-toggle.off::after { left: 2px; }

      /* ─── Color mode buttons ─────────────────────────────────── */
      .sb-btn-row {
        display: flex;
        gap: 4px;
        margin-bottom: 6px;
      }

      .sb-mode-btn {
        flex: 1;
        padding: 5px 0;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s, color 0.1s, border-color 0.1s;
      }

      .sb-mode-btn:hover { background: #1c2128; color: #c9d1d9; }

      .sb-mode-btn.active {
        background: #0d419d22;
        border-color: #58a6ff;
        color: #58a6ff;
      }

      .sb-key-hint {
        font-size: 10px;
        color: #6e7681;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      /* ─── View toggle button ────────────────────────────────── */
      .sb-view-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s, border-color 0.1s;
      }

      .sb-view-btn:hover {
        background: #1c2128;
        border-color: #58a6ff;
        color: #58a6ff;
      }

      /* ─── QA metrics ────────────────────────────────────────── */
      .sb-metric-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 3px 0;
        gap: 4px;
      }

      .sb-metric-label {
        color: #8b949e;
        font-size: 11px;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .sb-metric-value {
        color: #e6edf3;
        font-size: 11px;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      .sb-metric-value.good { color: #3fb950; }
      .sb-metric-value.warn { color: #f59e0b; }

      .sb-metric-subhead {
        font-size: 10px;
        color: #6e7681;
        margin-top: 8px;
        margin-bottom: 2px;
      }

      .sb-class-label { font-style: italic; }

      /* ─── Muted / placeholder ───────────────────────────────── */
      .sb-muted {
        color: #6e7681;
        font-size: 11px;
        font-style: italic;
      }

      /* ─── Footer ─────────────────────────────────────────────── */
      .sb-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        border-top: 1px solid #21262d;
        flex-shrink: 0;
        gap: 8px;
      }

      .sb-stat {
        font-size: 12px;
        color: #58a6ff;
        font-weight: 600;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      .sb-footer-label {
        font-size: 11px;
        color: #8b949e;
      }

      .sb-fps-label { margin-left: auto; }

      /* ─── Canvas container ──────────────────────────────────── */
      #canvas-container {
        flex: 1;
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      #canvas-container canvas {
        display: block;
      }

      /* ─── Benchmark overlay ─────────────────────────────────── */
      #viewer-metrics {
        position: absolute;
        bottom: 8px;
        right: 8px;
        font-family: ui-monospace, monospace;
        font-size: 9px;
        color: #484f58;
        pointer-events: none;
        display: none;
      }

      /* ─── Pipeline run button ──────────────────────────────── */
      .sb-run-btn {
        width: 100%;
        padding: 7px 0;
        background: #238636;
        border: 1px solid #2ea043;
        color: #ffffff;
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s, border-color 0.1s, opacity 0.1s;
        letter-spacing: 0.02em;
      }

      .sb-run-btn:hover:not(:disabled) { background: #2ea043; }

      .sb-run-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .sb-run-btn.running {
        background: #21262d;
        border-color: #58a6ff;
        color: #58a6ff;
      }

      .sb-run-btn.error {
        background: #21262d;
        border-color: #f85149;
        color: #f85149;
      }

      .sb-pipeline-status {
        margin-top: 5px;
        font-size: 10px;
        min-height: 14px;
      }

      .sb-pipeline-status.muted { color: #8b949e; }
      .sb-pipeline-status.done  { color: #3fb950; }
      .sb-pipeline-status.err   { color: #f85149; }

      /* ─── Scene reload flash ───────────────────────────────── */
      #scene-flash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: #58a6ff22;
        border: 1px solid #58a6ff44;
        transition: opacity 0.08s ease-in;
        z-index: 10;
      }
      #scene-flash.active { opacity: 1; }

      /* ─── Selection highlight ring ──────────────────────────── */
      .selected-feature-highlight { /* applied via material linewidth */ }

      /* ─── Loading overlay ───────────────────────────────────── */
      #loading-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #0d1117cc;
        z-index: 20;
        pointer-events: none;
      }

      #loading-overlay[hidden] { display: none; }

      .lo-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .lo-label {
        font-size: 11px;
        color: #8b949e;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
      }

      /* ─── Scene / Stage selector buttons ──────────────────── */
      .sb-btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }

      .sb-scene-btn,
      .sb-stage-btn {
        flex: 1 1 auto;
        min-width: 48px;
        padding: 4px 6px;
        background: #21262d;
        border: 1px solid #30363d;
        color: #8b949e;
        font-family: inherit;
        font-size: 10px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s, color 0.1s, border-color 0.1s;
        white-space: nowrap;
      }

      .sb-scene-btn:hover:not(:disabled),
      .sb-stage-btn:hover:not(:disabled) {
        background: #1c2128;
        color: #c9d1d9;
        border-color: #484f58;
      }

      .sb-scene-btn.active,
      .sb-stage-btn.active {
        background: #0d419d22;
        border-color: #58a6ff;
        color: #58a6ff;
      }

      .sb-stage-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* ─── Scene metadata chip ───────────────────────────────── */
      .scene-meta-chip {
        position: absolute;
        bottom: 12px;
        left: 12px;
        font-family: ui-monospace, 'SFMono-Regular', monospace;
        font-size: 10px;
        color: #8b949e;
        pointer-events: none;
        background: #0d111799;
        padding: 3px 7px;
        border-radius: 3px;
        border: 1px solid #21262d;
      }
    </style>
  </head>
  <body>
    <div id="sidebar"></div>
    <div id="canvas-container">
      <div id="scene-flash"></div>
      <div id="loading-overlay">
        <div class="lo-spinner"></div>
        <span class="lo-label">loading scene…</span>
      </div>
      <div id="scene-meta" hidden class="scene-meta-chip"></div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
